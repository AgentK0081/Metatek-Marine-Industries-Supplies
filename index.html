<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metatek Marine & Industries Supplies</title>  <!-- Firebase -->  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>  <style>
    body { margin:0; font-family: Arial; background:#0f0f0f; color:white; }
    header { padding:20px; background:#1a1a1a; display:flex; justify-content:space-between; }
    section { padding:30px; }
    input, textarea { width:100%; padding:10px; margin:10px 0; }
    button { padding:10px; background:#d4af37; border:none; cursor:pointer; }
    .hidden { display:none; }
  </style></head>
<body><header>
  <h2 id="title">Profile Cutting</h2>
  <div>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('hi')">HI</button>
    <button onclick="setLang('gu')">GU</button>
  </div>
</header><section>
  <h3 id="order">Request Order</h3>
  <form id="orderForm">
    <input type="text" id="size" placeholder="Plate Size (mm)" required>
    <input type="text" id="phone" placeholder="Phone Number" required>
    <input type="email" id="email" placeholder="Email" required>
    <textarea id="address" placeholder="Address"></textarea>
    <input type="file" id="file">
    <button type="submit">Submit</button>
  </form>
</section><section>
  <h3>Owner Login</h3>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Password">
  <button onclick="login()">Login</button>
</section><section id="requestsSection" class="hidden">
  <h3>Requests</h3>
  <ul id="requestsList"></ul>
</section><script>
// 🔥 REPLACE THIS WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// 🌍 LANGUAGE
const translations = {
  en: { title:"Metal Profile Cutting", order:"Request Order" },
  hi: { title:"मेटल प्रोफाइल कटिंग", order:"ऑर्डर करें" },
  gu: { title:"મેટલ પ્રોફાઇલ કટીંગ", order:"ઓર્ડર કરો" }
};

function setLang(lang) {
  document.getElementById('title').innerText = translations[lang].title;
  document.getElementById('order').innerText = translations[lang].order;
}

// 📦 SUBMIT ORDER
document.getElementById('orderForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  let fileUrl = "";
  const file = document.getElementById('file').files[0];

  if(file){
    const ref = storage.ref('designs/' + file.name);
    await ref.put(file);
    fileUrl = await ref.getDownloadURL();
  }

  await db.collection('orders').add({
    size: size.value,
    phone: phone.value,
    email: email.value,
    address: address.value,
    file: fileUrl,
    created: new Date()
  });

  alert("Order Submitted!");
});

// 🔐 LOGIN (Firebase Auth)
function login(){
  auth.signInWithEmailAndPassword(loginEmail.value, loginPassword.value)
    .then(() => {
      document.getElementById('requestsSection').classList.remove('hidden');
      loadRequests();
    })
    .catch(err => alert(err.message));
}

// 📊 LOAD REQUESTS + LIVE UPDATE (REAL-TIME)
function loadRequests(){
  db.collection('orders').orderBy('created','desc')
    .onSnapshot(snapshot => {
      const list = document.getElementById('requestsList');
      list.innerHTML = "";

      snapshot.forEach(doc => {
        const r = doc.data();
        const li = document.createElement('li');
        li.innerHTML = `
          ${r.size} mm | ${r.phone} | ${r.email}
          ${r.file ? `<br><a href="${r.file}" target="_blank">View Design</a>` : ''}
        `;
        list.appendChild(li);
      });

      // 🔔 SIMPLE NOTIFICATION
      if(Notification.permission === "granted"){
        new Notification("New Order Received!");
      }
    });
}

// 🔔 ASK NOTIFICATION PERMISSION
if("Notification" in window){
  Notification.requestPermission();
}
</script></body>
  </html>
